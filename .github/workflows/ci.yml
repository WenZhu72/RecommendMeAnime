name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: test
      APP_ENV: test
      DATABASE_URL: postgresql+psycopg://postgres:development@localhost:5432/recommend_me_anime_test
      TEST_DATABASE_URL: postgresql+psycopg://postgres:development@localhost:5432/recommend_me_anime_test
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: development
          POSTGRES_DB: recommend_me_anime_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d recommend_me_anime_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      - run: alembic upgrade head
      - run: python -m pytest

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
